# stem.conf — pure-Krypton terminal configuration
# Location: ~/.config/stem/stem.conf   (or point $STEM_CONF at a file)
# Format:   key = value     ('#' starts a comment; blank lines ignored)

# ── shell / session ───────────────────────────────────────────────
shell      = /bin/bash      # shell to spawn. NB: zsh is macOS-homebrew-only;
                            # Linux boxes usually have /bin/bash, not /bin/zsh.

# ── grid size ─────────────────────────────────────────────────────
cols       = 104            # terminal columns
rows       = 30             # terminal rows

# ── history ───────────────────────────────────────────────────────
scrollback = 2000           # scrollback buffer line cap

# ── appearance / behavior (reserved — honored once the GUI surface lands) ──
# font       = monospace
# font_size  = 12
# cursor     = block        # block | bar | underline
# bell       = visual       # visual | audible | off
# tab_width  = 8
# theme      = dark
