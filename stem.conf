# stem.conf — pure-Krypton terminal configuration
# Location: ~/.config/stem/stem.conf   (or point $STEM_CONF at a file)
# Format:   key = value     ('#' starts a comment; blank lines ignored)

# ── shell / session ───────────────────────────────────────────────
shell      = /bin/bash      # or /usr/bin/fish, /bin/zsh ... may include args
term       = xterm-256color # $TERM for the shell (Wayland sessions don't set it)

# ── grid size ─────────────────────────────────────────────────────
cols       = 104            # terminal columns
rows       = 30             # terminal rows

# ── history ───────────────────────────────────────────────────────
scrollback = 2000           # scrollback buffer line cap

# ── appearance (honored by the Wayland frontend, stem_wl) ─────────────
# Colours: hex RRGGBB, optional 0x/# prefix. Alpha ignored (fb is opaque).
bg            = 0x101821     # background
fg            = 0xCCFFCC     # foreground (the krypton green)
cursor_color  = 0xCCFFCC     # cursor colour (defaults to fg)
cursor_style  = block        # block | bar | underline
bell          = visual       # visual (flash) | off

# ── reserved (not yet wired) ──────────────────────────────────────
# font       = monospace
# font_size  = 12
# tab_width  = 8
# theme      = dark
